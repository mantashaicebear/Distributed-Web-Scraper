apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scraper-api
  template:
    metadata:
      labels:
        app: scraper-api
    spec:
      containers:
      - name: api-container
        image: mithilesh321/scraper-api:latest
        ports:
        - containerPort: 8000
        env:
        - name: KAFKA_BROKER
          value: "kafka-service:9092"
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  type: LoadBalancer
  selector:
    app: scraper-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000